<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ใจดี · Mental Check</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ====== RESET ====== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple:       #7C6AE8;
      --purple-l:     #A78BFA;
      --purple-soft:  #EDE9FF;
      --card:         #FFFFFF;
      --text:         #1A1835;
      --muted:        #6E7191;
      --green:        #22C983; --green-s:  #E6FFF4;
      --yellow:       #D97706; --yellow-s: #FFFBEB;
      --orange:       #EA580C; --orange-s: #FFF7ED;
      --red:          #DC2626; --red-s:    #FFF0F0;
      --shadow:       0 24px 64px rgba(124,106,232,.13), 0 4px 16px rgba(0,0,0,.06);
      --rcard:        28px; --rbtn: 16px;
      --ease:         cubic-bezier(.4,0,.2,1);
    }

    html, body { height: 100%; }
    body {
      font-family: 'Noto Sans Thai','Inter',-apple-system,sans-serif;
      min-height: 100vh;
      background: #F0EEFF;
      display: flex; align-items: center; justify-content: center;
      padding: 20px 16px;
      position: relative; overflow-x: hidden;
    }

    /* ====== BLOBS ====== */
    .blob { position:fixed; border-radius:50%; pointer-events:none; z-index:0; filter:blur(72px); animation:blobFloat 9s ease-in-out infinite; }
    .b1 { width:380px;height:380px; background:radial-gradient(circle,#C4B5FD,#A78BFA,transparent 80%); top:-110px;left:-130px; opacity:.48; animation-delay:0s; }
    .b2 { width:260px;height:260px; background:radial-gradient(circle,#93C5FD,#60A5FA,transparent 80%); bottom:-80px;right:-70px; opacity:.42; animation-delay:3.5s; }
    .b3 { width:180px;height:180px; background:radial-gradient(circle,#6EE7B7,#34D399,transparent 80%); bottom:22%;left:-50px; opacity:.38; animation-delay:6s; }
    @keyframes blobFloat { 0%,100%{transform:translate(0,0) scale(1)} 40%{transform:translate(14px,-18px) scale(1.05)} 70%{transform:translate(-8px,8px) scale(.97)} }

    /* ====== LAYOUT ====== */
    .app { width:100%; max-width:460px; position:relative; z-index:1; }

    /* ====== LANG BTN ====== */
    .lang-btn { position:fixed;top:18px;right:18px;z-index:200; background:#fff;border:none;border-radius:50px;padding:9px 20px; font-size:13px;font-weight:700;color:var(--purple);cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,.10);transition:all .2s var(--ease);font-family:inherit; }
    .lang-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.14); }

    /* ====== CARD ====== */
    .card { background:var(--card);border-radius:var(--rcard);padding:44px 34px 40px; box-shadow:var(--shadow);position:relative;overflow:hidden;animation:cardIn .42s cubic-bezier(.34,1.3,.64,1) both; }
    .card::before { content:'';position:absolute;top:0;left:0;right:0;height:4px; background:linear-gradient(90deg,var(--purple),var(--purple-l),#93C5FD); border-radius:var(--rcard) var(--rcard) 0 0; }
    @keyframes cardIn { from{opacity:0;transform:translateY(28px) scale(.96)} to{opacity:1;transform:none} }

    /* ====== TIER BADGE ====== */
    .tier-wrap { display:flex;align-items:center;justify-content:space-between;margin-bottom:28px; }
    .tier-badge { display:inline-flex;align-items:center;gap:6px;background:var(--purple-soft);color:var(--purple); font-size:12px;font-weight:700;padding:5px 12px;border-radius:50px;letter-spacing:.3px; }
    .progress-track { flex:1;height:6px;background:#EEECF9;border-radius:3px;overflow:hidden;margin-left:12px; }
    .progress-fill { height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-l));border-radius:3px;transition:width .5s cubic-bezier(.34,1.2,.64,1); }

    /* ====== WELCOME ====== */
    .w-icon { font-size:80px;text-align:center;display:block;margin-bottom:20px;animation:pop .55s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes pop { from{transform:scale(0) rotate(-15deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
    .w-title { font-size:29px;font-weight:800;color:var(--text);text-align:center;margin-bottom:12px; }
    .w-desc  { font-size:15px;color:var(--muted);text-align:center;line-height:1.75;margin-bottom:28px; }
    .w-tags  { display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:30px; }
    .tag     { background:var(--purple-soft);color:var(--purple);font-size:12px;font-weight:700;padding:5px 13px;border-radius:50px; }

    /* ====== PRIMARY BTN ====== */
    .btn-primary { width:100%;padding:20px;background:linear-gradient(135deg,var(--purple),var(--purple-l));border:none;border-radius:var(--rbtn); color:#fff;font-size:17px;font-weight:700;cursor:pointer;transition:all .2s var(--ease);font-family:inherit; box-shadow:0 8px 28px rgba(124,106,232,.38); }
    .btn-primary:hover { transform:translateY(-3px); box-shadow:0 14px 36px rgba(124,106,232,.45); }

    /* ====== QUESTION ====== */
    .q-emoji { font-size:60px;text-align:center;display:block;margin-bottom:16px;animation:pop .38s cubic-bezier(.34,1.56,.64,1) both; }
    .q-text  { font-size:20px;font-weight:700;color:var(--text);text-align:center;line-height:1.45;margin-bottom:8px; }
    .q-hint  { font-size:13px;color:var(--muted);text-align:center;margin-bottom:26px;line-height:1.5; }

    /* ====== OPTIONS (3) ====== */
    .options { display:flex;flex-direction:column;gap:10px; }
    .opt {
      width:100%;padding:16px 18px;background:#FAFAFA;border:2px solid #EEEAF9;border-radius:var(--rbtn);
      cursor:pointer;transition:all .18s var(--ease);display:flex;align-items:center;gap:12px;
      font-family:inherit;text-align:left;
    }
    .opt:hover { border-color:var(--purple);background:var(--purple-soft);transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,232,.16); }
    .opt:active { transform:translateY(0); }
    .opt.selected { border-color:var(--purple);background:var(--purple-soft); }
    .opt-icon  { font-size:24px;min-width:32px;text-align:center; }
    .opt-label { font-size:14px;font-weight:600;color:var(--text);line-height:1.45; }

    /* 2-option layout (2Q, 8Q) */
    .options-2 { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
    .opt-2 { width:100%;padding:18px 12px;background:#FAFAFA;border:2px solid #EEEAF9;border-radius:var(--rbtn); cursor:pointer;transition:all .18s var(--ease);display:flex;flex-direction:column;align-items:center;gap:8px; font-family:inherit;text-align:center; }
    .opt-2:hover { border-color:var(--purple);background:var(--purple-soft);transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,232,.16); }
    .opt-2-icon  { font-size:30px; }
    .opt-2-label { font-size:14px;font-weight:700;color:var(--text); }

    /* ====== TRANSITION SCREEN ====== */
    .transition-icon { font-size:64px;text-align:center;display:block;margin-bottom:18px;animation:pop .42s cubic-bezier(.34,1.56,.64,1); }
    .transition-title { font-size:21px;font-weight:800;color:var(--text);text-align:center;margin-bottom:10px; }
    .transition-desc  { font-size:15px;color:var(--muted);text-align:center;line-height:1.75;margin-bottom:32px; }
    .btn-continue { width:100%;padding:18px;background:linear-gradient(135deg,var(--purple),var(--purple-l));border:none;border-radius:var(--rbtn); color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s var(--ease);font-family:inherit; box-shadow:0 8px 24px rgba(124,106,232,.35); }
    .btn-continue:hover { transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,106,232,.44); }

    /* ====== RESULT ====== */
    .result-orb { width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center; font-size:56px;margin:0 auto 22px;animation:orbPop .6s cubic-bezier(.34,1.4,.64,1) both;position:relative; }
    .result-orb::after { content:'';position:absolute;inset:-7px;border-radius:50%;border:3px solid currentColor;opacity:.18;animation:pulse 2.8s ease-in-out infinite; }
    @keyframes orbPop { from{transform:scale(0) rotate(-20deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:.18} 50%{transform:scale(1.1);opacity:.35} }

    .result-title { font-size:24px;font-weight:800;text-align:center;margin-bottom:10px; }
    .result-desc  { font-size:14px;color:var(--muted);text-align:center;line-height:1.8;margin-bottom:24px; }

    /* Score bar */
    .score-bar-wrap { margin-bottom:24px; }
    .score-labels { display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:7px; }
    .score-track { height:9px;background:#EEECF9;border-radius:5px;overflow:hidden; }
    .score-fill  { height:100%;border-radius:5px;transition:width 1.1s cubic-bezier(.34,1.1,.64,1);width:0%; }

    /* Care box */
    .care-box { background:#F7F6FF;border-radius:18px;padding:18px 20px;margin-bottom:20px; }
    .care-head { font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px; }
    .care-row  { display:flex;align-items:flex-start;gap:9px;font-size:13px;color:var(--text);line-height:1.55;margin-bottom:9px; }
    .care-row:last-child { margin-bottom:0; }

    /* Hotline box */
    .hotline-box { border:2px solid var(--red);background:var(--red-s);border-radius:16px;padding:16px 18px;margin-bottom:18px;text-align:center; }
    .hotline-num { font-size:28px;font-weight:900;color:var(--red);margin-bottom:4px; }
    .hotline-sub { font-size:12px;color:var(--muted); }
    .hotline-btn { display:inline-block;margin-top:10px;padding:10px 24px;background:var(--red);color:#fff;font-weight:700;font-size:14px;border-radius:50px;text-decoration:none;border:none;cursor:pointer;font-family:inherit; }

    /* Divider */
    .divider { height:1px;background:#EEECF9;margin:0 -34px 20px; }

    /* Ghost + text buttons */
    .btn-ghost { width:100%;padding:14px;background:transparent;border:2px solid var(--purple);border-radius:var(--rbtn);color:var(--purple);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s var(--ease);font-family:inherit;margin-bottom:10px; }
    .btn-ghost:hover { background:var(--purple-soft);transform:translateY(-2px); }
    .btn-muted { width:100%;padding:12px;background:transparent;border:none;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s var(--ease);font-family:inherit; }
    .btn-muted:hover { color:var(--text); }

    /* ====== EMERGENCY OVERLAY ====== */
    .overlay { position:fixed;inset:0;background:rgba(220,38,38,.95);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .3s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .overlay-card { background:#fff;border-radius:24px;padding:40px 28px;max-width:400px;width:100%;text-align:center; }
    .overlay-emoji { font-size:64px;margin-bottom:16px;display:block; }
    .overlay-title { font-size:22px;font-weight:800;color:var(--red);margin-bottom:10px; }
    .overlay-desc  { font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:24px; }

    /* ====== RESPONSIVE ====== */
    @media (max-width:420px) {
      .card { padding:36px 20px 32px; }
      .q-text { font-size:18px; }
      .w-title { font-size:25px; }
      .divider { margin:0 -20px 20px; }
    }
  </style>
</head>

<div class="blob b2"></div>

  { emoji:'💙', th:{ q:'มีความคิดอยากทำร้ายตัวเอง หรือรู้สึกว่าถ้าตายไปน่าจะดีกว่า', hint:'ในช่วงเดือนที่ผ่านมา — ตอบตรงๆนะ ไม่มีผลตัดสิน' }, en:{ q:'Thoughts of harming yourself, or that you would be better off dead', hint:'In the past month — be honest, there\'s no judgment here' }, opts3:false }
];

const Q9_OPTS3 = {
  th:[{i:'🟢',t:'ไม่มีเลย'},{i:'🟡',t:'มีบ้างบางวัน'},{i:'🔴',t:'มีบ่อยเกือบทุกวัน'}],
  en:[{i:'🟢',t:'Not at all'},{i:'🟡',t:'Several days'},{i:'🔴',t:'Nearly every day'}]
};
const Q9_OPTS2 = {
  th:[{i:'✅',t:'ไม่มีเลย'},{i:'💙',t:'มีบ้าง'}],
  en:[{i:'✅',t:'No, not at all'},{i:'💙',t:'Sometimes, yes'}]
};

// 8Q (binary: No=0, Yes=weighted)
const Q8_Q = [
  { emoji:'💭', w:1,  th:'ในเดือนที่ผ่านมา คิดอยากตาย หรือรู้สึกว่าตายไปจะดีกว่า',              en:'In the past month, have you had thoughts that you would be better off dead?' },
  { emoji:'🩹', w:2,  th:'ในเดือนที่ผ่านมา อยากทำร้ายตัวเองหรือทำให้ตัวเองบาดเจ็บ',              en:'In the past month, have you wanted to hurt or injure yourself?' },
  { emoji:'⚠️', w:6,  th:'ในเดือนที่ผ่านมา มีความคิดเกี่ยวกับการฆ่าตัวตาย',                      en:'In the past month, have you had thoughts of suicide?' },
  { emoji:'📋', w:8,  th:'ในเดือนที่ผ่านมา มีแผนที่จะฆ่าตัวตาย',                                  en:'In the past month, have you had a plan to end your life?' },
  { emoji:'🚨', w:9,  th:'ในเดือนที่ผ่านมา ได้เตรียมการเพื่อทำร้ายตนเองหรือฆ่าตัวตายไว้แล้ว',    en:'In the past month, have you made preparations to harm yourself or end your life?' },
  { emoji:'🩺', w:4,  th:'ในเดือนที่ผ่านมา เคยทำให้ตัวเองบาดเจ็บแต่ไม่ตั้งใจให้ถึงตาย',          en:'In the past month, have you hurt yourself without intending to die?' },
  { emoji:'❗', w:10, th:'ในเดือนที่ผ่านมา เคยพยายามฆ่าตัวตาย',                                    en:'In the past month, have you attempted suicide?' },
  { emoji:'📖', w:4,  th:'ตลอดชีวิตที่ผ่านมา เคยพยายามฆ่าตัวตายหรือไม่?',                        en:'At any point in your life, have you ever attempted suicide?' }
];

/* ===========================================================
   STATE
=========================================================== */
let lang     = 'th';
let phase    = 'welcome';        // welcome | st5 | tr_2q | 2q | tr_9q | 9q | tr_8q | 8q | result
let qIdx     = 0;
let sc       = { st5:0, q2:0, q9:0, q8:0 };
let q9q9hit  = false;            // Q9 of 9Q triggered 8Q
let resultLv = '';
let lang_c   = () => C[lang];

/* ===========================================================
   UTILS
=========================================================== */
const app = () => document.getElementById('app');

function render(html) { app().innerHTML = html; }

/* ===========================================================
   LANG
=========================================================== */
function toggleLang() {
  lang = lang === 'th' ? 'en' : 'th';
  document.getElementById('langBtn').textContent = lang_c().langBtn;
  redraw();
}
function redraw() {
  if (phase === 'welcome') renderWelcome();
  else if (phase === 'st5')   renderST5();
  else if (phase === 'tr_2q') renderTransition('to2q', () => beginPhase2Q());
  else if (phase === '2q')    render2Q();
  else if (phase === 'tr_9q') renderTransition('to9q', () => beginPhase9Q());
  else if (phase === '9q')    render9Q();
  else if (phase === 'tr_8q') renderTransition('to8q', () => beginPhase8Q());
  else if (phase === '8q')    render8Q();
  else if (phase === 'result') renderResult();
}

/* ===========================================================
   WELCOME
=========================================================== */
function renderWelcome() {
  phase = 'welcome';
  const c = lang_c().welcome;
  const tags = c.tags.map(t=>`<span class="tag">${t}</span>`).join('');
  render(`
    <div class="card">
      <span class="w-icon">${c.icon}</span>
      <h1 class="w-title">${c.title}</h1>
      <p class="w-desc">${c.desc.replace(/\n/g,'<br>')}</p>
      <div class="w-tags">${tags}</div>
      <button class="btn-primary" onclick="startST5()">${c.start}</button>
    </div>`);
}

/* ===========================================================
   ST-5  (5 questions, 3 options, max=10)
   Thresholds (scaled from 0-15): 0-2 low, 3-4 mod, 5-6 high, ≥7 crisis→2Q
=========================================================== */
function startST5() {
  phase='st5'; qIdx=0; sc={st5:0,q2:0,q9:0,q8:0}; q9q9hit=false;
  renderST5();
}

function renderST5() {
  const q   = ST5_Q[qIdx];
  const c   = lang_c();
  const qd  = q[lang];
  const opts = q.opts[lang];
  const pct = Math.round(qIdx / ST5_Q.length * 100);

  render(`
    <div class="card">
      <div class="tier-wrap">
        <span class="tier-badge">${c.tierLabels.st5}</span>
        <div class="progress-track"><div class="progress-fill" id="pf"></div></div>
        <span style="font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap">${qIdx+1} ${c.qOf} ${ST5_Q.length}</span>
      </div>
      <span class="q-emoji">${q.emoji}</span>
      <h2 class="q-text">${qd.q}</h2>
      <p class="q-hint">${qd.hint}</p>
      <div class="options">
        ${opts.map((o,i)=>`
          <button class="opt" onclick="answerST5(${i})">
            <span class="opt-icon">${o.i}</span>
            <span class="opt-label">${o.t}</span>
          </button>`).join('')}
      </div>
    </div>`);
  rAF(()=>{ const el=document.getElementById('pf'); if(el) el.style.width=pct+'%'; });
}

const answerST5 = guard(function(choice) {
  sc.st5 += ST5_Q[qIdx].w[choice];
  qIdx++;

  if (qIdx < ST5_Q.length) {
    // Early termination: definitely low
    const rem = (ST5_Q.length - qIdx) * 2;
    if (sc.st5 + rem <= 2) { resultLv='st5_low'; phase='result'; renderResult(); return; }
    // Early termination: definitely crisis
    if (sc.st5 >= 7) { phase='tr_2q'; renderTransition('to2q', ()=>beginPhase2Q()); return; }
    renderST5();
  } else {
    if      (sc.st5 <= 2) { resultLv='st5_low';  phase='result'; renderResult(); }
    else if (sc.st5 <= 4) { resultLv='st5_mod';  phase='result'; renderResult(); }
    else if (sc.st5 <= 6) { resultLv='st5_high'; phase='result'; renderResult(); }
    else                  { phase='tr_2q'; renderTransition('to2q', ()=>beginPhase2Q()); }
  }
});

/* ===========================================================
   TRANSITION SCREENS
=========================================================== */
function renderTransition(key, next) {
  const tr = lang_c().transitions[key];
  const phaseMap = { to2q:'tr_2q', to9q:'tr_9q', to8q:'tr_8q' };
  phase = phaseMap[key];
  render(`
    <div class="card">
      <span class="transition-icon">${tr.icon}</span>
      <h2 class="transition-title">${tr.title}</h2>
      <p class="transition-desc">${tr.desc.replace(/\n/g,'<br>')}</p>
      <button class="btn-continue" onclick="goNext()">${tr.btn}</button>
    </div>`);
  window._nextFn = next;
}
function goNext() { if(window._nextFn) window._nextFn(); }

/* ===========================================================
   2Q  (2 binary questions — any positive → 9Q)
=========================================================== */
function beginPhase2Q() { phase='2q'; qIdx=0; render2Q(); }

function render2Q() {
  const q  = Q2_Q[qIdx];
  const c  = lang_c();
  const qd = q[lang];
  const opts = q.opts[lang];
  const pct = Math.round(qIdx / Q2_Q.length * 100);

  render(`
    <div class="card">
      <div class="tier-wrap">
        <span class="tier-badge">${c.tierLabels.q2}</span>
        <div class="progress-track"><div class="progress-fill" id="pf"></div></div>
        <span style="font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap">${qIdx+1} ${c.qOf} ${Q2_Q.length}</span>
      </div>
      <span class="q-emoji">${q.emoji}</span>
      <h2 class="q-text">${qd.q}</h2>
      <p class="q-hint">${qd.hint}</p>
      <div class="options-2">
        <button class="opt-2" onclick="answer2Q(0)">
          <span class="opt-2-icon">${opts[0].i}</span>
          <span class="opt-2-label">${opts[0].t}</span>
        </button>
        <button class="opt-2" onclick="answer2Q(1)">
          <span class="opt-2-icon">${opts[1].i}</span>
          <span class="opt-2-label">${opts[1].t}</span>
        </button>
      </div>
    </div>`);
  rAF(()=>{ const el=document.getElementById('pf'); if(el) el.style.width=pct+'%'; });
}

const answer2Q = guard(function(choice) {
  sc.q2 += choice;
  qIdx++;
  if (qIdx < Q2_Q.length) { render2Q(); return; }
  // All 2Q answered
  if (sc.q2 >= 1) {
    phase = 'tr_9q';
    renderTransition('to9q', ()=>beginPhase9Q());
  } else {
    resultLv = 'stressed';
    phase = 'result';
    renderResult();
  }
});

/* ===========================================================
   9Q  (PHQ-9 adapted — 8 questions 3-option, Q9 binary)
   Max = 17 (8×2 + 1×1).  Thresholds: ≤4 none, ≥5 → 8Q
   8Q trigger: total ≥ 5 OR Q9 > 0
=========================================================== */
function beginPhase9Q() { phase='9q'; qIdx=0; render9Q(); }

function render9Q() {
  const q    = Q9_Q[qIdx];
  const c    = lang_c();
  const qd   = q[lang];
  const is3  = q.opts3;
  const opts = is3 ? Q9_OPTS3[lang] : Q9_OPTS2[lang];
  const pct  = Math.round(qIdx / Q9_Q.length * 100);
  const optHtml = is3
    ? opts.map((o,i)=>`<button class="opt" onclick="answer9Q(${i})"><span class="opt-icon">${o.i}</span><span class="opt-label">${o.t}</span></button>`).join('')
    : `<div class="options-2">${opts.map((o,i)=>`<button class="opt-2" onclick="answer9Q(${i})"><span class="opt-2-icon">${o.i}</span><span class="opt-2-label">${o.t}</span></button>`).join('')}</div>`;

  render(`
    <div class="card">
      <div class="tier-wrap">
        <span class="tier-badge">${c.tierLabels.q9}</span>
        <div class="progress-track"><div class="progress-fill" id="pf"></div></div>
        <span style="font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap">${qIdx+1} ${c.qOf} ${Q9_Q.length}</span>
      </div>
      <span class="q-emoji">${q.emoji}</span>
      <h2 class="q-text">${qd.q}</h2>
      <p class="q-hint">${qd.hint}</p>
      <div class="options">${optHtml}</div>
      <div style="margin-top:16px;text-align:center">
        <a href="tel:1323" style="font-size:12px;color:var(--muted);text-decoration:none;font-weight:600">📞 ${lang==='th'?'สายด่วนสุขภาพจิต 1323':'Mental Health Hotline 1323'}</a>
      </div>
    </div>`);
  rAF(()=>{ const el=document.getElementById('pf'); if(el) el.style.width=pct+'%'; });
}

const answer9Q = guard(function(choice) {
  const isLast = qIdx === Q9_Q.length - 1; // Q9 (suicide)
  const score  = choice; // 0,1,2 or 0,1 for Q9

  sc.q9 += score;
  if (isLast && choice > 0) q9q9hit = true;
  qIdx++;

  // If Q9 triggered → 8Q immediately
  if (q9q9hit) {
    phase = 'tr_8q';
    renderTransition('to8q', ()=>beginPhase8Q());
    return;
  }

  if (qIdx < Q9_Q.length) { render9Q(); return; }

  // All 9Q done
  if (sc.q9 >= 5) {
    phase = 'tr_8q';
    renderTransition('to8q', ()=>beginPhase8Q());
  } else {
    // Map score to result
    if      (sc.q9 <= 4) resultLv = 'dep_none';
    else if (sc.q9 <= 8) resultLv = 'dep_mild';
    else                 resultLv = 'dep_mod';
    phase = 'result'; renderResult();
  }
});

/* ===========================================================
   8Q  (suicide risk — weighted binary, always show 1323)
   0 safe, 1-8 low, 9-16 mod, ≥17 emergency
=========================================================== */
function beginPhase8Q() { phase='8q'; qIdx=0; render8Q(); }

function render8Q() {
  const q  = Q8_Q[qIdx];
  const c  = lang_c();
  const pct= Math.round(qIdx / Q8_Q.length * 100);
  const qText = q[lang];
  const noL  = lang==='th'?'ไม่มี':'No';
  const yesL = lang==='th'?'มี':'Yes';

  render(`
    <div class="card">
      <div class="tier-wrap">
        <span class="tier-badge" style="background:#FFF0F0;color:var(--red)">${c.tierLabels.q8}</span>
        <div class="progress-track"><div class="progress-fill" id="pf" style="background:linear-gradient(90deg,var(--red),#F87171)"></div></div>
        <span style="font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap">${qIdx+1} ${c.qOf} ${Q8_Q.length}</span>
      </div>
      <span class="q-emoji">${q.emoji}</span>
      <h2 class="q-text" style="font-size:17px">${qText}</h2>
      <div style="margin:24px 0">
        <div class="options-2">
          <button class="opt-2" onclick="answer8Q(0)" style="border-color:#DCFCE7">
            <span class="opt-2-icon">✅</span>
            <span class="opt-2-label">${noL}</span>
          </button>
          <button class="opt-2" onclick="answer8Q(1)" style="border-color:#FEE2E2">
            <span class="opt-2-icon">🔴</span>
            <span class="opt-2-label">${yesL}</span>
          </button>
        </div>
      </div>
      <a href="tel:1323" style="display:block;background:var(--red);color:#fff;text-align:center;padding:14px;border-radius:14px;font-weight:700;font-size:14px;text-decoration:none;margin-top:4px">
        📞 ${c.call1323}
      </a>
    </div>`);
  rAF(()=>{ const el=document.getElementById('pf'); if(el) el.style.width=pct+'%'; });
}

const answer8Q = guard(function(choice) {
  if (choice === 1) sc.q8 += Q8_Q[qIdx].w;
  qIdx++;

  // Emergency check mid-assessment
  if (sc.q8 >= 17) { showEmergency(); return; }

  if (qIdx < Q8_Q.length) { render8Q(); return; }

  // Done
  if      (sc.q8 === 0)  resultLv = 'dep_sev'; // completed 8Q but all No → still high context from 9Q
  else if (sc.q8 <= 8)   resultLv = 'risk_low';
  else if (sc.q8 <= 16)  resultLv = 'risk_mod';
  else                   { showEmergency(); return; }
  phase = 'result'; renderResult();
});

/* ===========================================================
   EMERGENCY OVERLAY
=========================================================== */
function showEmergency() {
  resultLv = 'emergency';
  phase = 'result';
  const old = document.getElementById('emergOverlay');
  if (old) old.remove();
  const c = lang_c();
  document.body.insertAdjacentHTML('beforeend', `
    <div class="overlay" id="emergOverlay">
      <div class="overlay-card">
        <span class="overlay-emoji">🆘</span>
        <h2 class="overlay-title">${c.emergencyTitle}</h2>
        <p class="overlay-desc">${c.emergencyDesc.replace(/\n/g,'<br>')}</p>
        <a href="tel:1323" style="display:block;background:var(--red);color:#fff;padding:18px;border-radius:14px;font-weight:700;font-size:16px;text-decoration:none;margin-bottom:12px;text-align:center">${c.call1323}</a>
        <p style="font-size:11px;color:var(--muted);margin-bottom:20px">${c.hotlineNote}</p>
        <button onclick="dismissEmergency()" style="background:transparent;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;text-decoration:underline">${lang==='th'?'ฉันปลอดภัย ดูผลลัพธ์':'I am safe — show results'}</button>
      </div>
    </div>`);
}
function dismissEmergency() {
  const ov = document.getElementById('emergOverlay');
  if (ov) ov.remove();
  phase = 'result'; renderResult();
}

/* ===========================================================
   RESULT
=========================================================== */
function renderResult() {
  phase = 'result';
  const c    = lang_c();
  const res  = c.results[resultLv];
  const desc = c.descs[resultLv];
  const head = c.careHeads[resultLv];
  const care = c.care[resultLv];

  // Score bar: use appropriate score/max
  let barScore=0, barMax=10, barColor=res.color;
  if (['st5_low','st5_mod','st5_high'].includes(resultLv)) { barScore=sc.st5; barMax=10; }
  else if (resultLv==='stressed')   { barScore=sc.st5; barMax=10; }
  else if (['dep_none','dep_mild','dep_mod','dep_sev'].includes(resultLv)) { barScore=sc.q9; barMax=17; }
  else if (['risk_low','risk_mod','emergency'].includes(resultLv)) { barScore=Math.min(sc.q8,44); barMax=44; }
  const pct = Math.min(100, Math.round(barScore/barMax*100));

  // Hotline box for high-risk levels
  const showHotline = ['dep_sev','risk_low','risk_mod','emergency'].includes(resultLv);
  const hotlineHtml = showHotline ? `
    <div class="hotline-box">
      <div class="hotline-num">📞 1323</div>
      <div class="hotline-sub">${c.hotlineNote}</div>
      <a href="tel:1323" class="hotline-btn">${c.call1323}</a>
    </div>` : '';

  const careHtml = care ? care.map(i=>`<div class="care-row">${i}</div>`).join('') : '';

  render(`
    <div class="card">
      <div class="result-orb" style="background:${res.bg};color:${res.color}">${res.emoji}</div>
      <h2 class="result-title" style="color:${res.color}">${res.title}</h2>
      <p class="result-desc">${desc.replace(/\n/g,'<br>')}</p>

      <div class="score-bar-wrap">
        <div class="score-labels"><span>${c.scoreLow}</span><span>${c.scoreHigh}</span></div>
        <div class="score-track"><div class="score-fill" id="sf" style="background:${res.color}"></div></div>
      </div>

      ${hotlineHtml}

      ${care ? `<div class="care-box"><div class="care-head">${head}</div>${careHtml}</div>` : ''}

      <div class="divider"></div>
      <button class="btn-muted" onclick="renderWelcome()">${c.restartBtn}</button>
    </div>`);

  rAF(()=>{ setTimeout(()=>{ const el=document.getElementById('sf'); if(el) el.style.width=pct+'%'; },80); });
}

/* ===========================================================
   HELPERS
=========================================================== */
let _busy = false;
function guard(fn) { return function() { if(_busy) return; _busy=true; fn.apply(this,arguments); setTimeout(()=>_busy=false, 60); }; }
function rAF(fn) { requestAnimationFrame(()=>requestAnimationFrame(fn)); }

/* ===========================================================
   INIT
=========================================================== */
renderWelcome();
</script>
</body>
</html>
