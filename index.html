  <style>
    /* ====== RESET ====== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple:       #7C6AE8;
      --purple-l:     #A78BFA;
      --purple-soft:  #EDE9FF;
      --card:         #FFFFFF;
      --text:         #1A1835;
      --muted:        #6E7191;
      --green:        #22C983; --green-s:  #E6FFF4;
      --yellow:       #D97706; --yellow-s: #FFFBEB;
      --orange:       #EA580C; --orange-s: #FFF7ED;
      --red:          #DC2626; --red-s:    #FFF0F0;
      --shadow:       0 24px 64px rgba(124,106,232,.13), 0 4px 16px rgba(0,0,0,.06);
      --rcard:        28px; --rbtn: 16px;
      --ease:         cubic-bezier(.4,0,.2,1);
    }

    html, body { height: 100%; }
    body {
      font-family: 'Noto Sans Thai','Inter',-apple-system,sans-serif;
      min-height: 100vh;
      background: #F0EEFF;
      display: flex; align-items: center; justify-content: center;
      padding: 20px 16px;
      position: relative; overflow-x: hidden;
    }

    /* ====== BLOBS ====== */
    .blob { position:fixed; border-radius:50%; pointer-events:none; z-index:0; filter:blur(72px); animation:blobFloat 9s ease-in-out infinite; }
    .b1 { width:380px;height:380px; background:radial-gradient(circle,#C4B5FD,#A78BFA,transparent 80%); top:-110px;left:-130px; opacity:.48; animation-delay:0s; }
    .b2 { width:260px;height:260px; background:radial-gradient(circle,#93C5FD,#60A5FA,transparent 80%); bottom:-80px;right:-70px; opacity:.42; animation-delay:3.5s; }
    .b3 { width:180px;height:180px; background:radial-gradient(circle,#6EE7B7,#34D399,transparent 80%); bottom:22%;left:-50px; opacity:.38; animation-delay:6s; }
    @keyframes blobFloat { 0%,100%{transform:translate(0,0) scale(1)} 40%{transform:translate(14px,-18px) scale(1.05)} 70%{transform:translate(-8px,8px) scale(.97)} }

    /* ====== LAYOUT ====== */
    .app { width:100%; max-width:460px; position:relative; z-index:1; }

    /* ====== LANG BTN ====== */
    .lang-btn { position:fixed;top:18px;right:18px;z-index:200; background:#fff;border:none;border-radius:50px;padding:9px 20px; font-size:13px;font-weight:700;color:var(--purple);cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,.10);transition:all .2s var(--ease);font-family:inherit; }
    .lang-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.14); }

    /* ====== CARD ====== */
    .card { background:var(--card);border-radius:var(--rcard);padding:44px 34px 40px; box-shadow:var(--shadow);position:relative;overflow:hidden;animation:cardIn .42s cubic-bezier(.34,1.3,.64,1) both; }
    .card::before { content:'';position:absolute;top:0;left:0;right:0;height:4px; background:linear-gradient(90deg,var(--purple),var(--purple-l),#93C5FD); border-radius:var(--rcard) var(--rcard) 0 0; }
    @keyframes cardIn { from{opacity:0;transform:translateY(28px) scale(.96)} to{opacity:1;transform:none} }

    /* ====== TIER BADGE ====== */
    .tier-wrap { display:flex;align-items:center;justify-content:space-between;margin-bottom:28px; }
    .tier-badge { display:inline-flex;align-items:center;gap:6px;background:var(--purple-soft);color:var(--purple); font-size:12px;font-weight:700;padding:5px 12px;border-radius:50px;letter-spacing:.3px; }
    .progress-track { flex:1;height:6px;background:#EEECF9;border-radius:3px;overflow:hidden;margin-left:12px; }
    .progress-fill { height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-l));border-radius:3px;transition:width .5s cubic-bezier(.34,1.2,.64,1); }

    /* ====== WELCOME ====== */
    .w-icon { font-size:80px;text-align:center;display:block;margin-bottom:20px;animation:pop .55s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes pop { from{transform:scale(0) rotate(-15deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
    .w-title { font-size:29px;font-weight:800;color:var(--text);text-align:center;margin-bottom:12px; }
    .w-desc  { font-size:15px;color:var(--muted);text-align:center;line-height:1.75;margin-bottom:28px; }
    .w-tags  { display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:30px; }
    .tag     { background:var(--purple-soft);color:var(--purple);font-size:12px;font-weight:700;padding:5px 13px;border-radius:50px; }

    /* ====== PRIMARY BTN ====== */
    .btn-primary { width:100%;padding:20px;background:linear-gradient(135deg,var(--purple),var(--purple-l));border:none;border-radius:var(--rbtn); color:#fff;font-size:17px;font-weight:700;cursor:pointer;transition:all .2s var(--ease);font-family:inherit; box-shadow:0 8px 28px rgba(124,106,232,.38); }
    .btn-primary:hover { transform:translateY(-3px); box-shadow:0 14px 36px rgba(124,106,232,.45); }

    /* ====== QUESTION ====== */
    .q-emoji { font-size:60px;text-align:center;display:block;margin-bottom:16px;animation:pop .38s cubic-bezier(.34,1.56,.64,1) both; }
    .q-text  { font-size:20px;font-weight:700;color:var(--text);text-align:center;line-height:1.45;margin-bottom:8px; }
    .q-hint  { font-size:13px;color:var(--muted);text-align:center;margin-bottom:26px;line-height:1.5; }

    /* ====== OPTIONS (3) ====== */
    .options { display:flex;flex-direction:column;gap:8px; }
    .opt {
      width:100%;padding:13px 16px;background:#FAFAFA;border:2px solid #EEEAF9;border-radius:var(--rbtn);
      cursor:pointer;transition:all .18s var(--ease);display:flex;align-items:center;gap:12px;
      font-family:inherit;text-align:left;
    }
    .opt:hover { border-color:var(--purple);background:var(--purple-soft);transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,232,.16); }
    .opt:active { transform:translateY(0); }
    .opt.selected { border-color:var(--purple);background:var(--purple-soft); }
    .opt-icon  { font-size:24px;min-width:32px;text-align:center; }
    .opt-label { font-size:14px;font-weight:600;color:var(--text);line-height:1.45; }

    /* 2-option layout (2Q, 8Q) */
    .options-2 { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
    .opt-2 { width:100%;padding:18px 12px;background:#FAFAFA;border:2px solid #EEEAF9;border-radius:var(--rbtn); cursor:pointer;transition:all .18s var(--ease);display:flex;flex-direction:column;align-items:center;gap:8px; font-family:inherit;text-align:center; }
    .opt-2:hover { border-color:var(--purple);background:var(--purple-soft);transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,106,232,.16); }
    .opt-2-icon  { font-size:30px; }
    .opt-2-label { font-size:14px;font-weight:700;color:var(--text); }

    /* ====== TRANSITION SCREEN ====== */
    .transition-icon { font-size:64px;text-align:center;display:block;margin-bottom:18px;animation:pop .42s cubic-bezier(.34,1.56,.64,1); }
    .transition-title { font-size:21px;font-weight:800;color:var(--text);text-align:center;margin-bottom:10px; }
    .transition-desc  { font-size:15px;color:var(--muted);text-align:center;line-height:1.75;margin-bottom:32px; }
    .btn-continue { width:100%;padding:18px;background:linear-gradient(135deg,var(--purple),var(--purple-l));border:none;border-radius:var(--rbtn); color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s var(--ease);font-family:inherit; box-shadow:0 8px 24px rgba(124,106,232,.35); }
    .btn-continue:hover { transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,106,232,.44); }

    /* ====== RESULT ====== */
    .result-orb { width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center; font-size:56px;margin:0 auto 22px;animation:orbPop .6s cubic-bezier(.34,1.4,.64,1) both;position:relative; }
    .result-orb::after { content:'';position:absolute;inset:-7px;border-radius:50%;border:3px solid currentColor;opacity:.18;animation:pulse 2.8s ease-in-out infinite; }
    @keyframes orbPop { from{transform:scale(0) rotate(-20deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:.18} 50%{transform:scale(1.1);opacity:.35} }

    .result-title { font-size:24px;font-weight:800;text-align:center;margin-bottom:10px; }
    .result-desc  { font-size:14px;color:var(--muted);text-align:center;line-height:1.8;margin-bottom:24px; }

    /* Score bar */
    .score-bar-wrap { margin-bottom:24px; }
    .score-labels { display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:7px; }
    .score-track { height:9px;background:#EEECF9;border-radius:5px;overflow:hidden; }
    .score-fill  { height:100%;border-radius:5px;transition:width 1.1s cubic-bezier(.34,1.1,.64,1);width:0%; }

    /* Care box */
    .care-box { background:#F7F6FF;border-radius:18px;padding:18px 20px;margin-bottom:20px; }
    .care-head { font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px; }
    .care-row  { display:flex;align-items:flex-start;gap:9px;font-size:13px;color:var(--text);line-height:1.55;margin-bottom:9px; }
    .care-row:last-child { margin-bottom:0; }

    /* Hotline box */
    .hotline-box { border:2px solid var(--red);background:var(--red-s);border-radius:16px;padding:16px 18px;margin-bottom:18px;text-align:center; }
    .hotline-num { font-size:28px;font-weight:900;color:var(--red);margin-bottom:4px; }
    .hotline-sub { font-size:12px;color:var(--muted); }
    .hotline-btn { display:inline-block;margin-top:10px;padding:10px 24px;background:var(--red);color:#fff;font-weight:700;font-size:14px;border-radius:50px;text-decoration:none;border:none;cursor:pointer;font-family:inherit; }

    /* Divider */
    .divider { height:1px;background:#EEECF9;margin:0 -34px 20px; }

    /* Sources */
    .sources { margin-bottom:18px; }
    .sources-toggle { background:none;border:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;padding:0;display:flex;align-items:center;gap:4px; }
    .sources-toggle:hover { color:var(--text); }
    .sources-list { margin-top:10px;font-size:11px;color:var(--muted);line-height:1.7; }
    .sources-list a { color:var(--purple);text-decoration:none;font-weight:600; }

    /* Footer */
    .app-footer { text-align:center;padding:18px 0 4px;font-size:11px;color:var(--muted);line-height:1.6; }
    .app-footer a { color:var(--purple);text-decoration:none;font-weight:600; }

    /* Ghost + text buttons */
    .btn-ghost { width:100%;padding:14px;background:transparent;border:2px solid var(--purple);border-radius:var(--rbtn);color:var(--purple);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s var(--ease);font-family:inherit;margin-bottom:10px; }
    .btn-ghost:hover { background:var(--purple-soft);transform:translateY(-2px); }
    .btn-muted { width:100%;padding:12px;background:transparent;border:none;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s var(--ease);font-family:inherit; }
    .btn-muted:hover { color:var(--text); }

    /* ====== EMERGENCY OVERLAY ====== */
    .overlay { position:fixed;inset:0;background:rgba(220,38,38,.95);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .3s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .overlay-card { background:#fff;border-radius:24px;padding:40px 28px;max-width:400px;width:100%;text-align:center; }
    .overlay-emoji { font-size:64px;margin-bottom:16px;display:block; }
    .overlay-title { font-size:22px;font-weight:800;color:var(--red);margin-bottom:10px; }
    .overlay-desc  { font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:24px; }

    /* ====== SELECTION ANIMATION ====== */
    .opt.selected, .opt-2.selected {
      border-color: var(--purple) !important;
      background: var(--purple-soft) !important;
      transform: scale(0.97);
      transition: all 0.15s ease;
    }

    /* Fix sticky hover on touch devices */
    @media (hover: none) {
      .opt:hover, .opt-2:hover {
        border-color: #EEEAF9;
        background: #FAFAFA;
        transform: none;
        box-shadow: none;
      }
    }

    /* ====== RESPONSIVE ====== */
    @media (max-width:420px) {
      .card { padding:36px 20px 32px; }
      .q-text { font-size:18px; }
      .w-title { font-size:25px; }
      .divider { margin:0 -20px 20px; }
      .opt { padding:11px 14px; }
      .opt-icon { font-size:20px;min-width:28px; }
      .opt-label { font-size:13px; }
    }
  </style>
</head>
